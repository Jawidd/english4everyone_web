AWSTemplateFormatVersion: '2010-09-09'
Description: >
  English4All Leeds — Static website hosting
  Creates an S3 bucket (private) + CloudFront distribution.
  NO Lambda, NO API Gateway, NO backend — purely static hosting.

Parameters:
  DomainName:
    Type: String
    Description: Your custom domain (e.g. english4allinleeds.com). Leave blank to use CloudFront URL.
    Default: ""

Resources:

  # ── S3 Bucket ──────────────────────────────────────────────────────────────
  # Stores the built React app (dist/ folder contents).
  # Bucket is PRIVATE — CloudFront accesses it via Origin Access Control.
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "english4all-leeds-website-${AWS::AccountId}"
      # Block all public access — CloudFront is the only entry point
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Origin Access Control ──────────────────────────────────────────────────
  # Allows CloudFront to read from the private S3 bucket securely.
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "english4all-oac-${AWS::AccountId}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── S3 Bucket Policy ───────────────────────────────────────────────────────
  # Grants CloudFront permission to read objects from the bucket.
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Distribution ────────────────────────────────────────────────
  # CDN that serves the static site globally with HTTPS.
  # Configured for a React SPA: all 404s return index.html so React Router works.
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100  # US, Canada, Europe — cheapest tier

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""  # Empty — using OAC instead of OAI

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (AWS managed)
          Compress: true

        # SPA routing fix: React Router handles /about, /classes etc.
        # Without this, CloudFront would return a 403 for direct URL access.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  BucketName:
    Description: S3 bucket name — upload your dist/ contents here
    Value: !Ref WebsiteBucket

  CloudFrontURL:
    Description: CloudFront distribution URL — your website address
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  CloudFrontDistributionId:
    Description: Distribution ID — needed to invalidate cache after deploy
    Value: !Ref CloudFrontDistribution
