# docker-compose.yml
#
# Services:
#   web            → React app at http://localhost:5173  (hot reload)
#   studio         → Sanity Studio at http://localhost:3333  (local dev)
#   studio-deploy  → One-shot: deploys Studio to sanity.studio hosting
#
# Usage:
#   docker compose up web              → React app only
#   docker compose up studio --build   → Sanity Studio locally
#   docker compose run --rm studio-deploy → Deploy Studio to sanity.studio

services:
  # ── React app ──────────────────────────────────────────────────────────────
  web:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # ── Sanity Studio (local dev) ───────────────────────────────────────────────
  # Access at http://localhost:3333 while this is running.
  studio:
    build: ./studio
    ports:
      - "3333:3333"
    volumes:
      - ./studio:/studio
      - /studio/node_modules
    environment:
      - NODE_ENV=development

  # ── Sanity Studio deploy (one-shot) ────────────────────────────────────────
  # Deploys the Studio to Sanity's free hosting at:
  #   https://english4all-leeds.sanity.studio
  #
  # Run with:
  #   docker compose run --rm studio-deploy
  #
  # You will be prompted to log in via browser the first time.
  # After that, auth token is cached in the volume below.
  studio-deploy:
    build: ./studio
    volumes:
      - ./studio:/studio
      - /studio/node_modules
    environment:
      - SANITY_AUTH_TOKEN=${SANITY_AUTH_TOKEN}
    command: sh -c "npm install && npm run deploy"
    profiles:
      - deploy

  # ── Sanity Studio → S3 + CloudFront (one-shot) ─────────────────────────────
  # Builds the Studio and uploads to S3 for fast CloudFront delivery.
  #
  # Run with:
  #   docker compose --profile deploy-s3 run --rm studio-deploy-s3
  studio-deploy-s3:
    build:
      context: .
      dockerfile: Dockerfile.studio-build
    volumes:
      - ./studio/dist:/studio/dist
      - ~/.aws:/root/.aws:ro
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-2}
      - STUDIO_BUCKET=${STUDIO_BUCKET}
      - STUDIO_DISTRIBUTION_ID=${STUDIO_DISTRIBUTION_ID}
    entrypoint: sh -c
    command: >
      "apk add --no-cache aws-cli &&
       aws s3 sync /studio/dist s3://$$STUDIO_BUCKET --delete &&
       aws cloudfront create-invalidation --distribution-id $$STUDIO_DISTRIBUTION_ID --paths '/*'"
    profiles:
      - deploy-s3

volumes: {}
